version: 0.9.4

linter:
  rules:
    erb-no-unused-expressions:
      enabled: false
    erb-prefer-direct-output:
      enabled: false
    erb-strict-locals-required:
      enabled: true
    html-anchor-require-href:
      enabled: false
    html-img-require-alt:
      enabled: false
    html-no-space-in-tag:
      enabled: true
    html-no-title-attribute:
      enabled: true
    html-require-script-nonce:
      enabled: false
